<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GG SILENCE — Order Confirmed</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400&family=Oswald:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#050505;color:#EAEAEA;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
        .symbol{font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:0.6em;color:#9a7f4a;margin-bottom:40px;opacity:0.6}
        h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,12vw,96px);letter-spacing:0.08em;line-height:0.9;margin-bottom:24px}
        .accent{color:#9a7f4a}
        .line{width:60px;height:1px;background:rgba(154,127,74,0.3);margin:0 auto 32px}
        p{font-size:14px;color:rgba(234,234,234,0.4);line-height:1.8;max-width:400px;margin:0 auto 16px;font-weight:300}
        .detail{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:0.3em;color:rgba(234,234,234,0.2);margin-top:40px;text-transform:uppercase}
        .btn{display:inline-block;margin-top:48px;padding:16px 48px;border:1px solid rgba(154,127,74,0.3);color:#9a7f4a;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:0.4em;text-transform:uppercase;text-decoration:none;transition:all 0.4s}
        .btn:hover{border-color:#9a7f4a;background:rgba(154,127,74,0.05)}
        .noise{position:fixed;inset:0;pointer-events:none;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E")}
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="symbol">• ▌ ▐</div>
    <h1>ORDER<br><span class="accent">CONFIRMED</span></h1>
    <div class="line"></div>
    <p>Your payment has been processed successfully. You will receive a confirmation email shortly with your order details.</p>
    <p>Thank you for joining the SILENCE.</p>
    <div class="detail">GG SILENCE · Drop 001 · Barcelona 2026</div>
    <a href="/" class="btn">Return to SILENCE</a>
</body>
</html>
